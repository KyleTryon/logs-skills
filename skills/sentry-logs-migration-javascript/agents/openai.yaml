interface:
  display_name: "Sentry Logs JS Console Migration"
  short_description: "Migrate JS/TS console and existing logger calls to structured Sentry Logs with boundary maps, scoped context, wide events, redaction, and ESLint enforcement."
  brand_color: "#8B5CF6"
  default_prompt: "Audit console and existing logger usage by operation. Preserve production logger libraries such as pino or winston while configuring their Sentry capture path. Map execution flow and boundaries before edits, modify only logging-related code, move stable context to Sentry scopes, replace useful timing log fields with custom spans or span attributes, collapse narrative logs into one boundary-owned wide event using the logger's native structured syntax, move useful console context next to Sentry.captureException onto capture scope instead of adding duplicate Sentry.logger.error events, redact with beforeSendLog, and avoid timing attributes, duplicate failure logs, warning logs for expected outcomes, and 1:1 replacements unless the signal stands alone."

policy:
  allow_implicit_invocation: true
